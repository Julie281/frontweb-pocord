<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Meeting AI</h1>
        <p class="subtitle">Graba, analiza y convierte reuniones en tareas</p>
      </div>
    </header>

    <section class="upload-card card">
      <div class="upload-left">
        <h2>Subir grabación</h2>
        <p>Sube un audio para generar transcript, resumen y tareas.</p>
      </div>

      <div class="upload-right">
        <input type="file" id="fileInput" />
        <button class="primary-btn" onclick="upload()">Subir audio</button>
      </div>
    </section>

    <div id="statusBanner" class="status-banner hidden"></div>

    <main class="content-grid">
      <section class="card panel">
        <div class="panel-header">
          <h2>Reuniones</h2>
          <button class="ghost-btn" onclick="loadMeetings()">Actualizar</button>
        </div>
        <div id="meetings" class="list-container"></div>
      </section>

      <section class="card panel">
        <div class="panel-header">
          <h2>Tareas</h2>
          <button class="ghost-btn" onclick="loadTasks()">Actualizar</button>
        </div>
        <div id="tasks" class="list-container"></div>
      </section>
    </main>

    <section class="card detail-card">
      <div class="panel-header">
        <h2>Detalle de reunión</h2>
      </div>
      <div id="meetingDetail" class="detail-empty">
        Selecciona una reunión para ver su resumen, transcript y tareas.
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
